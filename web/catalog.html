<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Каталог</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            color: white;


            background: linear-gradient(to right, #1f4037, #99f2c8);
        }

        h1 {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background-color: white;
            color: black;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: lightgray;
        }

        .item {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px;
            gap: 15px;
            background-color: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        .red { color: #ff4d4d; }
        .blue { color: #4da6ff; }
        .green { color: #33cc66; }
        .purple { color: #b366ff; }
        .orange { color: #ff9933; }
        .brown { color: #d2a679; }
    </style>
</head>

<body>

    <h1>Каталог одежды</h1>

    <div class="item">
        <p><span class="red">Футболка</span> — 1000₽</p>
        <img src="1.jpg" width="80">
    </div>

    <div class="item">
        <p><span class="blue">Джинсы</span> — 3000₽</p>
        <img src="2.jpg" width="80">
    </div>

    <div class="item">
        <p><span class="green">Куртка</span> — 5000₽</p>
        <img src="3.jpg" width="80">
    </div>

    <div class="item">
        <p><span class="purple">Шорты</span> — 2000₽</p>
        <img src="4.jpg" width="80">
    </div>

    <div class="item">
        <p><span class="orange">Кеды</span> — 7000₽</p>
        <img src="5.jpg" width="80">
    </div>

    <div class="item">
        <p><span class="brown">Кепка</span> — 1000₽</p>
        <img src="6.jpg" width="80">
    </div>

    <a href="index.html" class="btn">Вернуться на главную</a>

</body>
</html>
